# Nome do workflow para identificação no GitHub Actions
name: Docker CI/CD Pipeline

# Define os gatilhos: executa sempre que houver um push na branch main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    # Utiliza a última versão do Ubuntu disponível no GitHub Actions
    runs-on: ubuntu-latest

    steps:
      # Passo 1: Faz o checkout do código do repositório para o runner
      - name: Checkout do código
        uses: actions/checkout@v4

      # Passo 2: Configura o Docker Buildx para builds mais eficientes
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Passo 3: Autenticação no Docker Hub
      # IMPORTANTE: Você deve configurar estes Segredos (Secrets) nas definições do seu repositório no GitHub
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Passo 4: Construção (Build) e envio (Push) da imagem
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Substitua 'meu-projeto' pelo nome que deseja dar à imagem no Docker Hub
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/meu-projeto:latest
            ${{ secrets.DOCKER_USERNAME }}/meu-projeto:${{ github.sha }}

      - name: Feedback final
        run: echo "Build e Push concluídos com sucesso para a imagem do Docker!"